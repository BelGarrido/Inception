# HTTP server block: keeps port 80 open only to redirect users to HTTPS.
server {
    # Listen on plain HTTP.
    listen 80;

    # Domain placeholder replaced by your setup script/environment.
    server_name SERVER_NAME_PLACEHOLDER;

    # Permanent redirect from HTTP to HTTPS.
    return 301 https://$host;
}

# HTTPS server block: terminates TLS and serves WordPress through PHP-FPM.
server {
    # Listen on HTTPS and mark this server as default.
    listen 443 ssl default_server;

    # Default file when a directory is requested.
    index index.php;

    # Domain placeholder replaced by your setup script/environment.
    server_name SERVER_NAME_PLACEHOLDER;

    # WordPress web root shared with the WordPress container.
    root /var/www/html;

    # Restrict TLS versions to project-required secure versions.
    ssl_protocols TLSv1.2 TLSv1.3;

    # Public certificate generated in entrypoint.
    ssl_certificate /etc/nginx/ssl/inception.crt;

    # Private key generated in entrypoint.
    ssl_certificate_key /etc/nginx/ssl/inception.key;

    # Route for static files and front-controller fallback.
    location / {
        # Try real file, then directory, then forward to index.php with query args.
        try_files $uri $uri/ /index.php?$args;
    }

    # Route that sends PHP scripts to PHP-FPM.
    location ~ \.php$ {
        # WordPress PHP-FPM service and port inside Docker network.
        fastcgi_pass wordpress:9000;

        # Standard FastCGI parameters (REQUEST_METHOD, QUERY_STRING, etc.).
        include fastcgi_params;

        # Absolute path of the PHP file to execute inside the container.
        fastcgi_param SCRIPT_FILENAME /var/www/html/$fastcgi_script_name;
    }
}

# -----------------------------------------------------------------------------
# Nginx configuration summary: 
# -----------------------------------------------------------------------------
# Purpose:
# - Force HTTPS access on your 42 domain.
# - Serve WordPress from /var/www/html.
# - Execute PHP through the wordpress PHP-FPM service on port 9000.
#
# Why FastCGI here:
# - In this setup, WordPress container runs php-fpm (no Apache/Nginx inside).
# - Nginx acts as reverse gateway and delegates PHP execution to php-fpm.
#
# Related files:
# - TLS cert/key are created by nginx entrypoint script in /etc/nginx/ssl/.
# - Domain placeholder must match your environment/domain replacement logic.