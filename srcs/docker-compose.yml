#   -e WORDPRESS_DB_HOST=mariadb 
#   -e WORDPRESS_DB_USER=wp_user 
#   -e WORDPRESS_DB_PASSWORD=wp_pass 
#   -e WORDPRESS_DB_NAME=wordpress_db 
#   wordpress:latest

# -----------------------------------------------------------------------------
# Docker Compose configuration summary:
# -----------------------------------------------------------------------------
# Purpose:
# - Orchestrate MariaDB, WordPress, and Nginx as a multi-container stack.
# - Isolate traffic using dedicated frontend and backend Docker networks.
# - Persist DB data and WordPress files with named volumes.
#
# Why two networks:
# - Limits DB exposure to internal containers only.
# - Keeps public-facing traffic separated from backend service traffic.
#
# Related files:
# - Service images are built from requirements/*/Dockerfile.
# - Runtime service behavior is configured in each service's conf/ and tools/ files.
