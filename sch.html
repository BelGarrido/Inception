<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nginx Request Flow — 42 School Inception</title>
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4f0;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-danger: #a32d2d;
    --color-border-primary: rgba(0,0,0,0.4);
    --color-border-secondary: rgba(0,0,0,0.3);
    --font-sans: system-ui, sans-serif;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1a;
      --color-background-secondary: #2c2c2a;
      --color-text-primary: #e8e6de;
      --color-text-secondary: #9c9a92;
      --color-text-danger: #f09595;
      --color-border-primary: rgba(255,255,255,0.4);
      --color-border-secondary: rgba(255,255,255,0.3);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem;
    min-height: 100vh;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 0.5rem;
    color: var(--color-text-primary);
  }
  p {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-bottom: 1.5rem;
  }
  .card {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-lg);
    padding: 1.5rem;
    width: 100%;
    max-width: 720px;
  }
  svg text { font-family: var(--font-sans); }
  .t  { font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  .th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }
  .arr { stroke: var(--color-text-secondary); stroke-width: 1.5; fill: none; }
  .leader { stroke: var(--color-text-secondary); stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }

  /* Color ramps */
  .c-gray   rect, .c-gray   circle { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-teal   rect, .c-teal   circle { fill: #E1F5EE; stroke: #0F6E56; }
  .c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
  .c-coral  rect, .c-coral  circle { fill: #FAECE7; stroke: #993C1D; }
  .c-gray   .th, .c-gray   .t, .c-gray   .ts { fill: #444441; }
  .c-teal   .th, .c-teal   .t, .c-teal   .ts { fill: #085041; }
  .c-purple .th, .c-purple .t, .c-purple .ts { fill: #3C3489; }
  .c-coral  .th, .c-coral  .t, .c-coral  .ts { fill: #712B13; }
  @media (prefers-color-scheme: dark) {
    .c-gray   rect, .c-gray   circle { fill: #444441; stroke: #B4B2A9; }
    .c-teal   rect, .c-teal   circle { fill: #085041; stroke: #5DCAA5; }
    .c-purple rect, .c-purple circle { fill: #3C3489; stroke: #AFA9EC; }
    .c-coral  rect, .c-coral  circle { fill: #712B13; stroke: #F0997B; }
    .c-gray   .th, .c-gray   .t, .c-gray   .ts { fill: #D3D1C7; }
    .c-teal   .th, .c-teal   .t, .c-teal   .ts { fill: #9FE1CB; }
    .c-purple .th, .c-purple .t, .c-purple .ts { fill: #CECBF6; }
    .c-coral  .th, .c-coral  .t, .c-coral  .ts { fill: #F5C4B3; }
  }
</style>
</head>
<body>
<h1>Nginx Request Flow</h1>
<p>42 School — Inception project · Docker multi-container architecture</p>
<div class="card">
<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Browser -->
<g class="c-gray">
  <rect x="260" y="20" width="160" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Browser</text>
</g>

<!-- Arrow: Browser -> Nginx -->
<line x1="340" y1="64" x2="340" y2="108" class="arr" marker-end="url(#arrow)" stroke="#378ADD"/>
<text class="ts" x="348" y="91">HTTPS :443</text>

<!-- Nginx container -->
<g class="c-teal">
  <rect x="200" y="108" width="280" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="130" text-anchor="middle" dominant-baseline="central">Nginx container</text>
  <text class="ts" x="340" y="152" text-anchor="middle" dominant-baseline="central">Serves static files / routes PHP</text>
</g>

<!-- Decision diamond -->
<polygon points="340,195 420,228 340,261 260,228" fill="var(--color-background-secondary)" stroke="var(--color-border-primary)" stroke-width="0.5"/>
<text class="ts" x="340" y="224" text-anchor="middle" dominant-baseline="central">PHP file?</text>

<!-- Nginx -> Diamond -->
<line x1="340" y1="168" x2="340" y2="193" class="arr" marker-end="url(#arrow)"/>

<!-- YES path -->
<line x1="420" y1="228" x2="508" y2="228" class="arr" marker-end="url(#arrow)" stroke="#1D9E75"/>
<text class="ts" x="455" y="220" text-anchor="middle">yes · FastCGI</text>

<!-- PHP-FPM / WordPress -->
<g class="c-purple">
  <rect x="510" y="200" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="580" y="220" text-anchor="middle" dominant-baseline="central">WordPress</text>
  <text class="ts" x="580" y="240" text-anchor="middle" dominant-baseline="central">PHP-FPM :9000</text>
</g>

<!-- NO path -->
<line x1="260" y1="228" x2="162" y2="228" class="arr" marker-end="url(#arrow)" stroke="#888780"/>
<text class="ts" x="207" y="220" text-anchor="middle">no</text>

<!-- Static files -->
<g class="c-gray">
  <rect x="40" y="200" width="120" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="100" y="220" text-anchor="middle" dominant-baseline="central">Static file</text>
  <text class="ts" x="100" y="240" text-anchor="middle" dominant-baseline="central">CSS, images…</text>
</g>

<!-- Static -> response -->
<line x1="100" y1="256" x2="100" y2="340" class="arr" marker-end="url(#arrow)" stroke="#888780"/>
<text class="ts" x="112" y="302">served directly</text>

<!-- PHP-FPM -> MariaDB -->
<line x1="580" y1="256" x2="580" y2="328" class="arr" marker-end="url(#arrow)" stroke="#534AB7"/>
<text class="ts" x="592" y="296">SQL :3306</text>

<!-- MariaDB -->
<g class="c-coral">
  <rect x="510" y="330" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="580" y="350" text-anchor="middle" dominant-baseline="central">MariaDB</text>
  <text class="ts" x="580" y="370" text-anchor="middle" dominant-baseline="central">Database :3306</text>
</g>

<!-- MariaDB -> PHP-FPM return -->
<path d="M650 358 Q668 358 668 228 Q668 196 652 196" fill="none" stroke="var(--color-border-secondary)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="672" y="295">data</text>

<!-- PHP-FPM -> Nginx return -->
<path d="M510 214 Q490 180 422 175" fill="none" stroke="var(--color-border-secondary)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="474" y="168" text-anchor="middle">HTML output</text>

<!-- Nginx -> Browser return -->
<path d="M260 130 Q210 90 258 56" fill="none" stroke="var(--color-border-secondary)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="186" y="100">HTTP response</text>

<!-- Shared volume -->
<rect x="40" y="430" width="600" height="44" rx="8" fill="none" stroke="var(--color-border-secondary)" stroke-width="0.8" stroke-dasharray="6 3"/>
<text class="ts" x="340" y="455" text-anchor="middle" dominant-baseline="central">Shared volume /var/www/html — both Nginx and WordPress must mount this</text>

<!-- Volume arrows -->
<line x1="580" y1="386" x2="580" y2="428" class="arr" marker-end="url(#arrow)" stroke="#534AB7" stroke-dasharray="4 3"/>
<line x1="340" y1="168" x2="340" y2="428" class="arr" marker-end="url(#arrow)" stroke="#1D9E75" stroke-dasharray="4 3" style="display:none"/>
<line x1="310" y1="386" x2="310" y2="428" class="arr" marker-end="url(#arrow)" stroke="#1D9E75" stroke-dasharray="4 3"/>

<!-- Bug box -->
<rect x="140" y="496" width="400" height="70" rx="8" fill="var(--color-background-secondary)" stroke="#E24B4A" stroke-width="0.8"/>
<text class="th" x="340" y="518" text-anchor="middle" dominant-baseline="central" style="fill:var(--color-text-danger)">Your two bugs</text>
<text class="ts" x="340" y="538" text-anchor="middle" dominant-baseline="central">① proxy_pass instead of fastcgi_pass in nginx.conf</text>
<text class="ts" x="340" y="556" text-anchor="middle" dominant-baseline="central">② WordPress volume commented out in docker-compose.yml</text>
</svg>
</div>
</body>
</html>
